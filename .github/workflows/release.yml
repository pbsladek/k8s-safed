name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Release please
        id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: go

  goreleaser:
    name: goreleaser
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Uploads multi-arch binary archives and checksums to the GitHub Release
      # that release-please already created. mode: keep-existing-fields preserves
      # the release notes written by release-please.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rewrite plugin.yaml with real download URLs and SHA256 checksums from
      # the GoReleaser-produced dist/checksums.txt, then attach the manifest
      # to the release so users can install with:
      #   kubectl krew install --manifest-url \
      #     https://github.com/pbsladek/k8s-safed/releases/latest/download/plugin.yaml
      - name: Update krew plugin manifest
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: python3 scripts/update-krew-manifest.py

      - name: Upload plugin.yaml to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${VERSION}" plugin.yaml --clobber

      # Push the updated plugin.yaml to main so the raw GitHub URL always
      # reflects the latest release:
      #   kubectl krew install --manifest-url \
      #     https://raw.githubusercontent.com/pbsladek/k8s-safed/main/plugin.yaml
      # [skip ci] in the commit message prevents re-triggering this workflow.
      - name: Commit updated plugin.yaml to main
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: bash scripts/commit-manifest.sh

  # ---------------------------------------------------------------------------
  # Optional: open a PR against the official krew-index once the plugin is
  # accepted there.
  #
  # Prerequisites (one-time manual setup — see README for full instructions):
  #   1. Fork https://github.com/kubernetes-sigs/krew-index
  #   2. Create a PAT with the "repo" scope and add it as the repository
  #      secret KREW_INDEX_PR_TOKEN.
  #   3. Add a repository variable KREW_INDEX_FORK set to your fork slug,
  #      e.g. pbsladek/krew-index.
  #   4. Uncomment this job.
