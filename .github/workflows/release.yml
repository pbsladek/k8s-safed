  #         KREW_GITHUB_TOKEN: ${{ secrets.KREW_INDEX_PR_TOKEN }}
  #         KREW_INDEX_FORK:   ${{ vars.KREW_INDEX_FORK }}
  #         VERSION:           ${{ github.ref_name }}
  #       run: bash scripts/submit-to-krew-index.sh
