name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/configure-pages@v4

      - name: Prepare Pages source
        run: |
          mkdir -p _pages/examples
          cp -R docs/. _pages/
          cp examples/*.yaml _pages/examples/
          {
            printf '%s\n' '---' 'layout: default' 'title: Examples' 'nav_order: 3' '---' ''
            sed '1s/^# kubectl-safed Examples/# Examples/' examples/README.md
          } > _pages/examples/index.md

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_pages
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
